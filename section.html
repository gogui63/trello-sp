<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <link rel="stylesheet" href="https://p.trellocdn.com/power-up.css">
    <link rel="stylesheet" href="./css/style.css">
  </head>
  <body>
    <div id="history-content">
      <div id="stats" class="stats-container" style="display: none;">
        <div class="stat-card">
          <span id="stat-initial" class="stat-value">-</span>
          <span class="stat-label">Initial</span>
        </div>
        <div class="stat-card">
          <span id="stat-current" class="stat-value">-</span>
          <span class="stat-label">Restant</span>
        </div>
        <div class="stat-card">
          <span id="stat-consumed" class="stat-value">-</span>
          <span class="stat-label">Consommé</span>
        </div>
      </div>

      <p id="no-history" style="display: none; color: #5e6c84; font-size: 14px; text-align: center; margin-top: 20px;">
        Aucun point défini pour le moment.
      </p>

      <table id="history-table" style="display: none;">
        <thead>
          <tr>
            <th>Date</th>
            <th>Action</th>
            <th>Note</th>
            <th>Reste</th>
          </tr>
        </thead>
        <tbody id="history-body"></tbody>
      </table>
    </div>

    <script src="https://p.trellocdn.com/power-up.min.js"></script>
    <script src="./js/section.js"></script>
  </body>
</html>
